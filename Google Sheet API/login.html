<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-white" style="font-family: 'Raleway', sans-serif;">
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/register">Register</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link" href="/login">Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="border border-2 p-3 shadow-lg rounded-2" style="width: 350px" >
        <form method="post" action="/login">
          {{ALERT}}<br>
            <h3 class="text-center">User Login</h3>
          <div class="mb-3">
              <input type="text" class="form-control border-2 rounded-2" placeholder="Username" name="username">
          </div>
          <div class="mb-3">
              <input type="password" class="form-control border-2 rounded-2" placeholder="Password" name="password">
          </div>
          <input type="submit" class="border rounded-2 btn w-100" value="Login"><br><br>
          <label class="text-black">Don't have an account? <a href="/register">Register</a> now!</label>
        </form>
        </div>
    </div>
  </body>
</html>
